<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuildCrafter | Page Not Found</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(244, 177, 89, 0.25), transparent 25%),
          linear-gradient(180deg, #163126 0%, #0d1e17 44%, #09140f 100%);
        color: #f7f3ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      main {
        width: min(720px, 100%);
        padding: 2rem;
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(21, 47, 35, 0.95), rgba(11, 24, 18, 0.95));
        border: 1px solid rgba(243, 227, 197, 0.12);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      p {
        color: #d6c7ac;
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 0.78rem;
        color: #ffcf85;
      }

      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.9rem 1.25rem;
        border-radius: 999px;
        background: linear-gradient(135deg, #f4b159, #ffcf85);
        color: #27180a;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">BuildCrafter</p>
      <h1>This page wandered off the build grid.</h1>
      <p>The link may be old, or the page may have moved. Head back to the generator and build something even better.</p>
      <a href="/">Return Home</a>
    </main>
  </body>
</html>
